###############################################################################
# Blitz Dopamine Loop
# Total Blitz games played.
###############################################################################
- id: badge_played_blitz
  type: badge
  category: Veterancy
  subcategory:
  name: 'Blitz Dopamine Loop'
  description: 'Total Blitz games played.'
  badge-flavor-text: '*"He who analyzes blitz is stupid."* — Rashid Nezhmetdinov'
  config:
    tiers:
      pawn:
        amount:               15     # all the numbers here are from total games played -1
        tier-flavor-text: '*"Who the hell is Rashid Nezhmetdinov?"*'
      knight:
        amount:               63     #
        tier-flavor-text: '*You know Rashid Nezhmetdinov is good because you can\'t pronounce his name.*'
      bishop:
        amount:              255     #
        tier-flavor-text: '*"Wait, is the number of games required the same as \'Obsession\' but minus 1?"*'
      rook:
        amount:              399     #
        tier-flavor-text: '*By the way, I just wanted to say: you are doing a great job at playing chess.*'
      queen:
        amount:             2499     #
        tier-flavor-text: '*Just some feedback: Have you considered trying to win some of these?*'
      king:
        amount:             4095     #
        tier-flavor-text: '*You have spent approximately 23 days of your finite lifespan playing Blitz.*'
      immortal:
        amount:             8901     #
        tier-flavor-text: '*Rashid Nezhmetdinov was a Soviet chess Master and checkers player. Now you know.*'
      legend:
        amount:            20000     # except for this number
        tier-flavor-text: '*Thank you for playing. Don\'t forget to like, comment, and subscribe, and hit that notification bell.*'



