###############################################################################
# OBSESSION
# Total games played across all time controls.
###############################################################################
# subcategory could be `Guru`
# I'm not sure if the category ultrabullet actually exists ... I mean we have the clock data 
# anyway, but let's do that later
# what about hyperbullet?
- id: badge_played_total
  type: badge
  category: Veterancy
  subcategory: 
  name: 'Obsession'
  description: 'Total games played across all time controls.'
  badge-flavor-text: '*"Trying is the first step to failure."* — GM Ben Finegold'
  config:
    tiers:
      pawn:
        amount:               16     # number of pieces
        tier-flavor-text: '*A for effort.*'
      knight:
        amount:               64     # number of squares
        tier-flavor-text: '*$2^{64}$ grains of rice worth of effort.*'
      bishop:
        amount:              256     # number of squares in a team game
        tier-flavor-text: '*You won at least some of them, right?*'
      rook:
        amount:              400     # number of games after 2 plies
        tier-flavor-text: '*"I\'m not hardstuck."*'
      queen:
        amount:             2500     # minimum elo to become grandmaster
        tier-flavor-text: '*Good job!*'
      king:
        amount:             4096     # = 64 * 64
        tier-flavor-text: '*Grass touching is advised.*'
      immortal:
        amount:             8902     # number of games after 3 plies
        tier-flavor-text: '*Are these all bullet games?*'
      legend:
        amount:            20000     # just a round number
        tier-flavor-text: '*Really? Now I need to add more content.*'



###############################################################################
# WINNER
# Total games won across all time controls.
###############################################################################
- id: badge_won_total
  type: badge
  category: Veterancy
  subcategory:
  name: 'Winner'
  description: 'Total games won across all time controls.'
  badge-flavor-text: '*Something something... sign of a gentleman*.'
  config:
    tiers:
      pawn:
        amount:                7     # (16) | just a lucky number
        tier-flavor-text: '*“I like the moment when I break a man\'s ego.”*'
      knight:
        amount:               21     # (64) | blackjack
        tier-flavor-text: '*Winner winner chicken dinner.*'
      bishop:
        amount:               67     # (256) | meme
        tier-flavor-text: '*"I understood that reference."*'
      rook:
        amount:               77     # (400) | another lucky number
        tier-flavor-text: '*"The number of wins required for this feels completely arbitrary. 1/5 stars." — a review on Steam*'
      queen:
        amount:              777     # (2500) | another lucky number
        tier-flavor-text: '*You know what? Good job! I\'m proud of you, actually.*'
      king:
        amount:             1931     # (4096) | on this year, Nevada legalized gambling
        tier-flavor-text: 'If rock paper scissors is a game of chance, then chess must be too.'
      immortal:
        amount:             4444     # (8902) | the quad jack
        tier-flavor-text: '*Actually, you win a lot...*'
      legend:
        amount:            20000     # just a round number
        tier-flavor-text: '*I\'m considering not counting ultrabullet games in the next update.*'


