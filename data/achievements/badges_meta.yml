###############################################################################
# WINNER
# Total games won across all time controls.
###############################################################################
- id: badge_won_total
  type: badge
  category: "Veterancy"
  subcategory: ""
  name: "Winner"
  description: "Total games won across all time controls."
  flavor_text: "*Something something... sign of a gentleman*."
  config:
    metric_key: "is_win"
    required_value: true
    is_hidden: false
    tiers:
      - name: "pawn"
        amount: 7     # (16) | just a lucky number
        flavor_text: '*“I like the moment when I break a man''s ego.”*'

      - name: "knight"
        amount: 21     # (64) | blackjack
        flavor_text: "*Winner winner chicken dinner.*"

      - name: "bishop"
        amount: 67     # (256) | meme
        flavor_text: '*"I understood that reference."*'

      - name: "rook"
        amount: 77     # (400) | another lucky number
        flavor_text: '*"The number of wins required for this feels completely arbitrary. 1/5 stars." — a review on Steam*'

      - name: "queen"
        amount: 777     # (2500) | another lucky number
        flavor_text: '*You know what? Good job! I''m proud of you, actually.*'

      - name: "king"
        amount: 1931     # (4096) | on this year, Nevada legalized gambling
        flavor_text: "If rock paper scissors is a game of chance, then chess must be too."

      - name: "immortal"
        amount: 4444     # (8902) | the quad jack
        flavor_text: "*Actually, you win a lot...*"

      - name: "legend"
        amount: 20000     # just a round number
        flavor_text: '*I''m considering not counting ultrabullet games in the next update.*'






