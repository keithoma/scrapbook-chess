###############################################################################
# Blitz Dopamine Loop
# Total Blitz games played.
###############################################################################
- id: badge_played_blitz
  type: badge
  category: "Veterancy"
  subcategory: ""
  name: "Blitz Dopamine Loop"
  description: "Total Blitz games played."
  flavor_text: '*"He who analyzes blitz is stupid."* — Rashid Nezhmetdinov'
  config:
    metric_key: "speed"
    required_value: "blitz"
    is_hidden: false
    tiers:
      - name: "pawn"
        amount: 15     # all the numbers here are from total games played -1
        flavor_text: '*"Who the hell is Rashid Nezhmetdinov?"*'

      - name: "knight"
        amount: 63     #
        flavor_text: '*You know Rashid Nezhmetdinov is good because you can''t pronounce his name.*'

      - name: "bishop"
        amount: 255     #
        flavor_text: '*"Wait, is the number of games required the same as ''Obsession'' but minus 1?"*'

      - name: "rook"
        amount: 399     #
        flavor_text: '*By the way, I just wanted to say: you are doing a great job at playing chess.*'

      - name: "queen"
        amount: 2499     #
        flavor_text: '*Just some feedback: Have you considered trying to win some of these?*'

      - name: "king"
        amount: 4095     #
        flavor_text: '*You have spent approximately 23 days of your finite lifespan playing Blitz.*'

      - name: "immortal"
        amount: 8901     #
        flavor_text: '*Rashid Nezhmetdinov was a Soviet chess Master and checkers player. Now you know.*'

      - name: "legend"
        amount: 20000     # except for this number
        flavor_text: '*Thank you for playing. Don''t forget to like, comment, and subscribe, and hit that notification bell.*'



