###############################################################################
# OBSESSION
# Total games played across all time controls.
###############################################################################
- id: badge_played_total
  type: badge
  category: "Veterancy"
  subcategory: "Mileage"
  name: "Obsession"
  description: "Total games played across all time controls."
  flavor_text: '*"Trying is the first step to failure."* — GM Ben Finegold'
  config:
    metric_key: null
    is_hidden: false
    tiers:
      - name: "pawn"
        amount: 16     # number of pieces
        flavor_text: "*A for effort.*"

      - name: "knight"
        amount: 64     # number of squares
        flavor_text: "*$2^{64}$ grains of rice worth of effort.*"

      - name: "bishop"
        amount: 256     # number of squares in a team game
        flavor_text: "*You won at least some of them, right?*"

      - name: "rook"
        amount: 400     # number of games after 2 plies
        flavor_text: '*"I''m not hardstuck."*'

      - name: "queen"
        amount: 2500     # minimum elo to become grandmaster
        flavor_text: "*Good job!*"

      - name: "king"
        amount: 4096     # = 64 * 64
        flavor_text: "*Grass touching is advised.*"

      - name: "immortal"
        amount: 8902     # number of games after 3 plies
        flavor_text: "*Are these all bullet games?*"

      - name: "legend"
        amount: 20000     # just a round number
        flavor_text: "*Really? Now I need to add more content.*"



###############################################################################
# STARCRAFT III
# Total Ultra Bullet games played.
###############################################################################
- id: badge_played_ultrabullet
  type: badge
  category: "Veterancy"
  subcategory: "Mileage"
  name: "StarCraft III"
  description: "Total Ultra Bullet games played."
  flavor_text: "*Please don''t sue me, Blizzard.*"
  config:
    metric_key: "speed"
    required_value: "ultrabullet"
    is_hidden: true
    tiers:
      - name: "pawn"
        amount: 1998      # year of StarCraft I release
        flavor_text: '*I''d claim fair use anyway.*'

      - name: "knight"
        amount: 2010      # year of StarCraft II release
        flavor_text: '*"Ping diff."*'

      - name: "bishop"
        amount: 2015      # year of the Legacy of the Void release
        flavor_text: '*Take the hint. I really don''t want you playing ultra bullet.*'

      - name: "rook"
        amount: 9001      # it's over 9000
        flavor_text: '*"I''m applying for Korean citizenship."*'

      - name: "queen"
        amount: 10101     # 1-1-1 build order format
        flavor_text: "*400 APM.*"

      - name: "king"
        amount: 20000     # matching standard mileage cap
        flavor_text: '*"16 units is nothing. Have you seen my Zerg rush?"*'

      - name: "immortal"
        amount: 49998     # an unsatisfying number
        flavor_text: '*There''s Serral. And then there''s you.*'

      - name: "legend"
        amount: 100000     # just a big number
        flavor_text: '*Was this actually "worth it" to you?*'