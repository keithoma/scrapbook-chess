        flavor:
          quote: 'Ultrabullet is not chess, it''s just a clicking contest.'
          author: 'GM Andrew Tang'

      - name: 'bishop'
        amount: 11
        flavor:
          player_quote: 'What''s up with the progression for this achievement?'

      - name: 'rook'
        amount: 100
        flavor:
          text: 'It''s just binary. You win or you lose.'

      - name: 'queen'
        amount: 101
        flavor:
          text: 'One does not simply draw a hyperbullet game.'

      - name: 'king'
        amount: 110
        flavor:
          player_quote: 'Wait... is the achievement title again a reference to dru... *beeping noise*'

      - name: 'immortal'
        amount: 111
        flavor:
          text: 'Ecstasy... of playing chess.'

      - name: 'legend'
        amount: 1000
        flavor:
          text: 'I am currently out of the office for my annual summer holiday and will return on September 15th.'



