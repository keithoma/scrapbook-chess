###############################################################################
# OVERTHINKING
# Total Rapid games won.
###############################################################################
- id: badge_won_rapid
  type: badge
  category: 'Veterancy'
  subcategory: 'Body Count'
  name: 'Overthinking'
  description: 'Total Rapid games won.'
  flavor:
    quote: 'I hate rapid.'
    author: 'Daniil Dubov, World Rapid Chess Champion'
  config:
    metric_key: 'is_rapid_win'
    required_value: true
    is_hidden: false
    tiers:
      - name: 'stone'
        amount: 1
        flavor:
          text: 'Overthin...KING! I''ll see myself out.'

      - name: 'pawn'
        amount: 3     # let's just take the fibonacci sequence here
        flavor:
          text: 'Wait, am I actually good?'

      - name: 'knight'
        amount: 13     #
        flavor:
          text: 'Your opponents must be playing chess on their smart fridge.'

      - name: 'bishop'
        amount: 34     #
        flavor:
          text: 'Your Ad Could Go Here.'

      - name: 'rook'
        amount: 55     #
        flavor:
          text: 'Fine, I''ll acknowledge you: You play well... sometimes.'

      - name: 'queen'
        amount: 377     #
        flavor:
          text: 'By the way, the number of wins required is not random, but you wouldn''t get it.'

      - name: 'king'
        amount: 610     #
        flavor:
          text: 'Congratulations!'

      - name: 'immortal'
        amount: 987     #
        flavor:
          text: 'Okay, let''s be real though: The online rapid pool is not very good compared to Blitz.'

      - name: 'legend'
        amount: 5000     # obviously not prime
        flavor:
          text: 'You are not supposed to be in here. Leave immediately.'




###############################################################################
# GALAXY BRAIN
# Total Classical games won.
###############################################################################
- id: badge_won_classical
  type: badge
  category: 'Domination'
  subcategory: 'Body Count'
  name: 'Galaxy Brain'
  description: 'Total Classical games won.'
  flavor:
    quote: 'Chess is a constant struggle between my desire not to lose and my desire not to think.'
    author: 'GM Jan Gustafsson'
  config:
    metric_key: 'is_classical_win'
    required_value: true
    is_hidden: false
    tiers:
      - name: 'stone'
        amount: 1
        flavor:
          text: 'Playing a classical game to deeply analyze positional nuances like a proper grandmaster.'

      - name: 'pawn'
        amount: 2
        flavor:
          text: 'Buying a $200 physical wooden set to mirror your online classical game, only to blunder the exact same rook on both boards simultaneously.'

      - name: 'knight'
        amount: 3
        flavor:
          text: 'Winning a 60-minute classical game while spending less than two minutes of total clock time.'

      - name: 'bishop'
        amount: 5
        flavor:
          text: 'Queueing up a 60-minute classical game because you need a timer for your slow-baked lasagna and refuse to buy a kitchen clock.'

      - name: 'rook'
        amount: 8
        flavor:
          text: 'Queueing up a classical game purely to use the in-game chat box as an Omegle replacement.'

      - name: 'queen'
        amount: 13
        flavor:
          text: 'Playing a classical game on your second monitor so you have something to do during your League of Legends death timers.'

      - name: 'king'
        amount: 21
        flavor:
          text: 'Queueing up two classical games simultaneously—one as White, one as Black—and mirroring the moves so two random strangers unwittingly play each other.'

      - name: 'immortal'
        amount: 34
        flavor:
          text: 'Opening 120 classical games at once so furiously alt-tabbing between them recreates the visceral panic of ultrabullet.'

      - name: 'legend'
        amount: 250
        flavor:
          text: 'Writing the entire YAML configuration for this game''s achievement system in the chat box while waiting for your opponent to calculate move 4.'
