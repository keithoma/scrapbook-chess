  flavor:
    quote: 'I don''t care.'
    author: 'Hikaru Nakamura, a Twitch streamer'
  config:
    metric_key: 'is_bullet_win'
    required_value: true
    is_hidden: false
    tiers:
      - name: 'stone'
        amount: 1
        flavor:
          text: 'Vexillology. Vex-IL-lology. Two Ls, like the ones your opponents always takes. Look, I had to check the spelling four times just now.'

      - name: 'pawn'
        amount: 9
        flavor:
          text: 'This is the chess equivalent of finishing a microwave meal before the microwave beeps.'

      - name: 'knight'
        amount: 99
        flavor:
          text: 'Boj Doog!'

      - name: 'bishop'
        amount: 299
        flavor:
          text: 'Wooden shield'
          
      - name: 'rook'
        amount: 599
        flavor:
          text: 'When you start seeing the chess board on the ceiling.'

      - name: 'queen'
        amount: 999
        flavor: 'Really, what''s a juicer? A pawn? A bishop? Or like everything?'

      - name: 'king'
        amount: 1499
        flavor:
          quote: 'Beneath this mask there is more than flesh. Beneath this mask there is an idea, Mr. Creedy. And ideas are bulletproof.'
          author: 'the best superhero movie ever'

      - name: 'immortal'
        amount: 2199
        flavor:
          text: 'Don''t punch the clock!'

      - name: 'legend'
        amount: 3000
        flavor:
          text: 'I''m offline, but Hikaru might not. Go do something else.'



